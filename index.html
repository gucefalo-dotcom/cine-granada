<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyección Especial - Granada</title>
    <style>
        :root {
            --dorado: #e0c097;
            --oscuro: #0d0d0d;
            --romantico: #ff4d6d;
        }

        body {
            background-color: var(--oscuro);
            color: var(--dorado);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- ESTILO ENTRADA CINE --- */
        #interfaz-codigo {
            border: 2px solid var(--dorado);
            padding: 40px;
            max-width: 400px;
            transition: opacity 1s ease;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--dorado);
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
        }

        button {
            background: var(--dorado);
            color: var(--oscuro);
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- ESTILO ROMÁNTICO (OCULTO AL INICIO) --- */
        #resultado-final {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .foto-pareja {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 5px solid var(--romantico);
            object-fit: cover;
            box-shadow: 0 0 30px var(--romantico);
            margin: 20px 0;
            animation: latido 2s infinite;
        }

        h2 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 0 10px var(--romantico);
            margin: 10px;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Animación de corazones cayendo */
        .corazon {
            position: fixed;
            top: -10px;
            color: var(--romantico);
            font-size: 20px;
            user-select: none;
            z-index: 1000;
            animation: caer linear forwards;
        }

        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="interfaz-codigo">
        <h1>🎞️ TICKET DE ACCESO</h1>
        <p>Introduce el código final de Vagnasus</p>
        <input type="text" id="codigo-input" placeholder="CÓDIGO" autocomplete="off">
        <br>
        <button onclick="verificarCodigo()">Validar Entrada</button>
        <div id="mensaje-error" style="margin-top:20px; color:#ff6b6b; min-height: 40px;"></div>
    </div>

    <div id="resultado-final">
        <h2>¿Quieres salir conmigo?</h2>
        <img src="FOTO_CON_EL.jpeg" class="foto-pareja" alt="Nosotros">
        <p style="color: white; font-size: 1.2rem;">Has encontrado el código, ahora falta tu respuesta.</p>
    </div>

    <script>
        function crearCorazon() {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerText = '❤️';
            corazon.style.left = Math.random() * 100 + 'vw';
            corazon.style.animationDuration = Math.random() * 3 + 2 + 's';
            corazon.style.opacity = Math.random();
            document.body.appendChild(corazon);
            setTimeout(() => corazon.remove(), 5000);
        }

        function verificarCodigo() {
            const codigoCorrecto = "rahvwlwy8";
            const input = document.getElementById('codigo-input').value.toLowerCase().trim();
            const errorDiv = document.getElementById('mensaje-error');

            if (input === codigoCorrecto) {
                document.getElementById('interfaz-codigo').style.display = 'none';
                const final = document.getElementById('resultado-final');
                final.style.display = 'flex';
                setTimeout(() => { final.style.opacity = '1'; }, 100);
                
                // Iniciar lluvia de corazones
                setInterval(crearCorazon, 300);
            } else {
                const frases = [
                    "¡Casi! Pero mi amor por ti es más real que ese código.",
                    "Vagnasus, revisa tus notas... ¡tú puedes!",
                    "Código incorrecto, pero tu sonrisa es de 10.",
                    "¡Error! Sigue buscando, que el premio vale la pena."
                ];
                errorDiv.innerText = frases[Math.floor(Math.random() * frases.length)];
                document.getElementById('codigo-input').value = "";
            }
        }
    </script>
</body>
</html>
