<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyección Especial - Granada</title>
    <style>
        :root {
            --dorado: #e0c097;
            --oscuro: #0d0d0d;
            --romantico: #ff4d6d;
            --verde: #2ecc71;
        }

        body {
            background-color: var(--oscuro);
            color: var(--dorado);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* --- FASE 1: CÓDIGO --- */
        #interfaz-codigo {
            border: 2px solid var(--dorado);
            padding: 40px;
            max-width: 400px;
            z-index: 10;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--dorado);
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
        }

        .btn-validar {
            background: var(--dorado);
            color: var(--oscuro);
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- FASE 2: PREGUNTA --- */
        #resultado-final {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .foto-pareja {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid var(--romantico);
            object-fit: cover;
            box-shadow: 0 0 30px var(--romantico);
            margin: 15px 0;
            animation: latido 2s infinite;
        }

        h2 { font-size: 2rem; color: white; text-shadow: 0 0 10px var(--romantico); }

        /* --- BOTONES SÍ/NO --- */
        .contenedor-botones {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 100px;
        }

        .btn-si {
            background: var(--verde);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-no {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 50px;
            position: absolute;
            transition: all 0.2s ease;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .corazon {
            position: fixed;
            top: -10px;
            color: var(--romantico);
            z-index: 1000;
            animation: caer linear forwards;
        }

        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="interfaz-codigo">
        <h1>TICKET DE ACCESO</h1>
        <p>Introduce el código de Vagnasus</p>
        <input type="text" id="codigo-input" placeholder="CÓDIGO">
        <br>
        <button class="btn-validar" onclick="verificarCodigo()">Validar</button>
        <div id="mensaje-error" style="margin-top:20px; color:#ff6b6b;"></div>
    </div>

    <div id="resultado-final">
        <h2>¿Quieres salir conmigo?</h2>
        <img src="FOTO_CON_EL.jpeg" class="foto-pareja" alt="Nosotros">
        <p style="color:white;">Albaricoque.</p>
        
        <div class="contenedor-botones">
            <button class="btn-si" onclick="aceptar()">¡SÍ!</button>
            <button id="btn-no" class="btn-no" onmouseover="huir(this)">NO</button>
        </div>
    </div>

    <script>
        function crearCorazon(emoji = '❤️') {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerText = emoji;
            corazon.style.left = Math.random() * 100 + 'vw';
            corazon.style.fontSize = (Math.random() * 20 + 20) + 'px';
            corazon.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(corazon);
            setTimeout(() => corazon.remove(), 4000);
        }

        function verificarCodigo() {
            const input = document.getElementById('codigo-input').value.toLowerCase().trim();
            if (input === "rahvwlwy8") {
                document.getElementById('interfaz-codigo').style.display = 'none';
                const final = document.getElementById('resultado-final');
                final.style.display = 'flex';
                setTimeout(() => final.style.opacity = '1', 100);
                setInterval(() => crearCorazon('❤️'), 500);
            } else {
                const frases = ["¡Casi! Revisa tus notas.", "Código mal, pero tú estás muy bien.", "¡Error! Inténtalo de nuevo."];
                document.getElementById('mensaje-error').innerText = frases[Math.floor(Math.random() * frases.length)];
            }
        }

        function huir(boton) {
            const x = Math.random() * (window.innerWidth - boton.offsetWidth);
            const y = Math.random() * (window.innerHeight - boton.offsetHeight);
            boton.style.left = x + 'px';
            boton.style.top = y + 'px';
            boton.style.position = 'fixed';
        }

        function aceptar() {
            alert("¡SABÍA QUE DIRÍAS QUE SÍ! ❤️");
            setInterval(() => {
                crearCorazon('💖');
                crearCorazon('🧟');
                crearCorazon('🌹');
            }, 100);
        }
    </script>
</body>
</html>
